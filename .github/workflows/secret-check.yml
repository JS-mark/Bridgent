name: secret Check (manual)

# Run this from Actions → "secret Check (manual)" → Run workflow
# whenever release.yml prints "No NPM_TOKEN found, but OIDC is
# available". It tells you in one shot whether NPM_TOKEN is missing,
# misnamed, or revoked. Output is safe to share — npm tokens are
# auto-masked by GitHub Actions; we only print length and whoami.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    # Match release.yml: NPM_TOKEN lives under the "cicd" GitHub Environment.
    environment: cicd
    env:
      NPM_TOKEN_VALUE: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: 1) Is the secret present at repo level?
        run: |
          echo "=== NPM_TOKEN presence ==="
          if [ -z "$NPM_TOKEN_VALUE" ]; then
            echo "❌ NPM_TOKEN is EMPTY."
            echo
            echo "GitHub did not inject any value for \${{ secrets.NPM_TOKEN }}."
            echo
            echo "Most likely causes (check in this order):"
            echo "  a) secret is stored in a GitHub Environment (not at repo level)."
            echo "     Fix: https://github.com/JS-mark/Bridgent/settings/Secrets/actions"
            echo "          → top section 'Repository Secrets' (NOT 'Environment Secrets')"
            echo "          → tab 'Secrets' (NOT 'Variables')."
            echo "  b) secret name is misspelled. Must be exactly: NPM_TOKEN"
            echo "     (case-sensitive, no surrounding whitespace)."
            echo "  c) Workflow is gated on a non-existent environment that hides Secrets."
            exit 1
          fi
          echo "✓ NPM_TOKEN is set (length=${#NPM_TOKEN_VALUE} chars, value masked by GitHub)"

      - name: 2) Does the secret look like an npm token?
        run: |
          echo "=== Token shape ==="
          PREFIX="${NPM_TOKEN_VALUE:0:4}"
          echo "Prefix: $PREFIX..."
          case "$PREFIX" in
            npm_) echo "✓ Looks like an npm Automation/Publish token (npm_*)." ;;
            *)    echo "⚠️  Doesn't start with npm_. Modern npm tokens start with 'npm_'."
                  echo "   Legacy/UUID-style tokens still work but are deprecated."
                  ;;
          esac

      - name: 3) Does the token actually authenticate?
        run: |
          echo "=== npm whoami ==="
          # Write the token where the npm CLI looks for it.
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN_VALUE" > ~/.npmrc

          if WHOAMI=$(npm whoami --registry=https://registry.npmjs.org/ 2>&1); then
            echo "✓ Authenticated as: $WHOAMI"
            echo
            echo "If the user above does NOT own the @bridgent scope on npm,"
            echo "publish will still 404. Check:"
            echo "  https://www.npmjs.com/settings/$WHOAMI/packages"
            echo "  https://www.npmjs.com/settings/$WHOAMI/orgs"
          else
            echo "❌ Token is set but npm rejected it:"
            echo "$WHOAMI"
            echo
            echo "Likely causes:"
            echo "  - Token revoked / expired"
            echo "  - Token type isn't 'Automation' or 'Publish' (Read-only won't publish)"
            echo "  - Token has a package allowlist that excludes @bridgent/*"
            exit 1
          fi

      - name: 4) Can we see existing @bridgent/* packages?
        run: |
          echo "=== npm view existing packages ==="
          for pkg in @bridgent/core @bridgent/cli @bridgent/source-openapi @bridgent/source-prisma; do
            if VERSION=$(npm view "$pkg" version 2>/dev/null); then
              echo "  ✓ $pkg@$VERSION"
            else
              echo "  · $pkg (not yet on npm)"
            fi
          done
