name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: ['22.18', '24']

    # The repo .npmrc pins registry.npmmirror.com for CN dev; on Actions runners
    # we force npmjs.org for reliability.
    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}

      - name: Activate pnpm via Corepack
        run: |
          npm install -g corepack@latest
          corepack enable
          corepack prepare --activate
          pnpm --version

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ matrix.node }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-${{ matrix.node }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ matrix.node }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ matrix.node }}-

      - name: Lint
        run: pnpm turbo run lint

      - name: Typecheck
        run: pnpm turbo run typecheck

      # Build before Test so the @bridgent/host-test cli-smoke case can find
      # the freshly built `bridgent` binary at packages/cli/dist/cli.mjs.
      - name: Build
        run: pnpm turbo run build

      - name: Test
        run: pnpm turbo run test

  # PR-only: every PR that touches a publishable package must ship a changeset.
  # Skipped on the auto-generated "chore(release): version packages" PR (it
  # consumes existing changesets and shouldn't add new ones).
  changeset-check:
    name: Changeset Check
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request'
      && !startsWith(github.event.pull_request.title, 'chore(release):')

    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Activate pnpm via Corepack
        run: |
          npm install -g corepack@latest
          corepack enable
          corepack prepare --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify a changeset exists for any publishable changes
        run: pnpm changeset status --since=origin/${{ github.base_ref }}
